name: Fetch chunk
on: {workflow_dispatch: {}}
permissions: {contents: write}
jobs:
  fetch:
    name: chunk-${{ matrix.chunk }}
    runs-on: ubuntu-latest
    timeout-minutes: 350
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        chunk: [5,6,7,8,9]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: pip install 'httpx[http2]==0.28.1'
      - run: python gen_chunks.py
      - env: {OUT_DIR: data}
        run: python download_chunk.py chunks/chunk_$(printf "%03d" ${{ matrix.chunk }}).json 12
      - run: tar -cf chunk-${{ matrix.chunk }}.tar -C data .
      - env: {GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"}
        run: |
          gh release create data-v1 --title "Dukascopy data" --notes "Auto" --target "$GITHUB_SHA" 2>/dev/null || true
          gh release upload data-v1 "chunk-${{ matrix.chunk }}.tar" --clobber
